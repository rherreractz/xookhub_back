# Ruta: nginx/nginx.conf
# Nginx as XookHub's API Gateway / reverse proxy in front of the FastAPI
# `api` service. The critical concern here is the SSE chat stream: proxy
# buffering must be OFF for it, otherwise Nginx holds tokens back and the
# "real-time" typing effect collapses into one delayed dump.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Upstream = the FastAPI service on the internal compose network.
    upstream xookhub_api {
        server api:8000;
    }

    # Allow large document uploads (matches the 50 MB cap in DocumentService;
    # a little headroom for multipart overhead).
    client_max_body_size 55m;

    server {
        listen 80;
        server_name _;

        # --- SSE chat stream -----------------------------------------
        # Must come BEFORE the generic /api/ location so it wins the match.
        # `POST /api/v1/conversations/{id}/messages` returns text/event-stream.
        location ~ ^/api/v1/conversations/[^/]+/messages$ {
            proxy_pass http://xookhub_api;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # The SSE-critical directives:
            proxy_buffering       off;   # don't accumulate the response
            proxy_cache           off;
            proxy_set_header Connection '';        # keep upstream conn alive
            chunked_transfer_encoding on;
            proxy_read_timeout    3600s; # long-lived stream, don't time out
            proxy_send_timeout    3600s;
        }

        # --- Everything else under the API ---------------------------
        location /api/ {
            proxy_pass http://xookhub_api;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
        }

        # --- Health probe (no auth, no /api prefix) ------------------
        location = /health {
            proxy_pass http://xookhub_api;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}