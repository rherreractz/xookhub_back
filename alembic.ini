# Ruta: alembic.ini
# Alembic configuration. The database URL is intentionally NOT set here —
# `alembic/env.py` injects it at runtime from `src.config.Settings`, so the
# single source of truth for the DSN stays the application settings / .env,
# never a duplicated value in this file.

[alembic]
script_location = alembic
prepend_sys_path = .

# Use a UTC, timestamped, slug-based filename for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

# sqlalchemy.url is populated programmatically in env.py; leave blank here.
sqlalchemy.url =

[post_write_hooks]
# (Optional) auto-format generated migrations. Uncomment if `black` is a dev
# dependency in your environment.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S